<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCAP Draw Toolbar — Button States</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Poppins:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:          #1a7a8a;
    --hover-bg:      #f1f5f9;
    --disabled-bg:   #eaeaea;
    --disabled-fg:   #94a3b8;
    --border:        #e2e8f0;
    --text:          #2d3748;
    --muted:         #718096;
    --card:          #f5f8fa;
  }

  body {
    background: #eef1f3;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 48px 32px 80px;
    color: var(--text);
  }

  .page-header    { margin-bottom: 52px; }
  .page-title     { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  .page-sub       { font-size: 13px; color: var(--muted); margin-top: 5px; }

  .section        { margin-bottom: 56px; }
  .section-label  {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 18px;
  }


  /* ════════════════════════════════════════════════════════
     1.  ICON BUTTON — Figma "Soft / Medium" isolated spec
     ════════════════════════════════════════════════════════ */

  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px; height: 40px;
    padding: 10px;
    background: #ffffff;
    border: 2px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    color: var(--teal);
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .icon-btn i {
    transition: opacity 0.12s ease;
  }

  /* Hover */
  .icon-btn:hover,
  .demo-hover .icon-btn {
    background: var(--hover-bg);
    border-color: var(--hover-bg);
  }

  /* Active */
  .icon-btn.active,
  .demo-active .icon-btn {
    background: rgba(26, 122, 138, 0.09);
    border-color: rgba(26, 122, 138, 0.2);
  }

  /* Disabled */
  .icon-btn:disabled,
  .icon-btn.is-disabled,
  .demo-disabled .icon-btn {
    background: var(--disabled-bg);
    border-color: transparent;
    cursor: not-allowed;
    color: var(--disabled-fg);
    pointer-events: none;
  }


  /* ════════════════════════════════════════════════════════
     2.  States reference grid
     ════════════════════════════════════════════════════════ */

  .states-row  { display: flex; gap: 2px; align-items: flex-start; }
  .state-col   { display: flex; flex-direction: column; align-items: center; }

  .state-swatch {
    width: 80px; height: 80px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    display: flex; align-items: center; justify-content: center;
  }
  .state-meta {
    width: 80px;
    padding: 10px 8px 14px;
    background: white;
    border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 10px 10px;
    text-align: center;
  }
  .state-name { font-size: 11px; font-weight: 600; color: var(--text); }
  .state-spec {
    font-family: 'Space Mono', monospace;
    font-size: 9px; color: var(--muted);
    margin-top: 5px; line-height: 1.6;
  }
  .state-spec span { display: block; }


  /* ════════════════════════════════════════════════════════
     3.  FIGMA FULL TOOLBAR  (1986:638673 & 1986:638679)
     ════════════════════════════════════════════════════════ */

  .ft-wrap {
    /* White card with Figma drop-shadow */
    display: inline-flex;
    flex-direction: column;
    background: #ffffff;
    border-radius: 6px;
    filter: drop-shadow(0px 4px 2px rgba(0, 0, 0, 0.16));
    position: relative;
  }

  /* Title row */
  .ft-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: #2d3748;
    padding: 10px 8px;
    line-height: normal;
    white-space: nowrap;
  }

  /* Button strip — flush, no gaps */
  .ft-btns {
    display: flex;
    align-items: stretch;
    border-radius: 6px;
    overflow: hidden;
  }

  .ft-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px; height: 40px;
    padding: 10px;
    border: none;
    border-radius: 0;
    cursor: pointer;
    color: var(--teal);
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
    transition: background 0.12s ease;
  }
  .ft-btn i { transition: color 0.12s ease; }

  /* Rounded outer corners on first/last button */
  .ft-btns .ft-btn:first-child { border-radius: 0 0 0 6px; }
  .ft-btns .ft-btn:last-child  { border-radius: 0 0 6px 0; }

  /* --- Default (available) --- */
  .ft-btn.fb-default {
    background: #ffffff;
  }
  .ft-btn.fb-default:hover {
    background: var(--hover-bg);
  }

  /* --- Active (pressed / selected) --- */
  .ft-btn.fb-active {
    background: #ffffff;
  }

  /* --- Disabled --- */
  .ft-btn.fb-disabled {
    background: var(--disabled-bg);
    cursor: not-allowed;
    color: var(--disabled-fg);
    pointer-events: none;
  }

  /* "✦ NEW" badge */
  .ft-badge {
    position: absolute;
    top: -9px;
    right: 6px;
    background: #d7c482;
    color: #000;
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
    font-size: 10px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
    white-space: nowrap;
    pointer-events: none;
    animation: badgePulse 1.5s ease infinite;
  }
  @keyframes badgePulse {
    0% {
    box-shadow: 0 0 0 0px #d7c482;
  }
  100% {
    box-shadow: 0 0 0 8px #00000000;
  }
  }


  /* ════════════════════════════════════════════════════════
     4.  Toolbar comparison layout
     ════════════════════════════════════════════════════════ */

  .toolbar-pair {
    display: flex;
    gap: 48px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .toolbar-item-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    color: var(--muted); margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .toolbar-item-label .tl-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
  }
  .toolbar-item-label .tl-dot.is-active {
    background: var(--teal);
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(26,122,138,0.4); }
    50%      { box-shadow: 0 0 0 4px rgba(26,122,138,0); }
  }

  /* ════════════════════════════════════════════════════════
     5.  Interactive demo card
     ════════════════════════════════════════════════════════ */

  .demo-card {
    display: inline-block;
    background: rgba(255, 255, 255, 0.396);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    padding: 28px 28px 22px;
  }
  .demo-card-title {
    font-size: 12px; font-weight: 600; color: var(--text);
    margin-bottom: 16px;
  }
  .demo-hint {
    font-size: 11px; color: var(--muted);
    margin-top: 14px; max-width: 340px; line-height: 1.5;
  }

  /* Simple standalone toolbar (used inside demo card) */
  .sep {
    width: 1px; height: 20px;
    background: var(--border); flex-shrink: 0; margin: 0 2px;
  }
  .toolbar {
    display: inline-flex; align-items: center; gap: 2px;
    padding: 6px 8px; background: #ffffff;
    border-radius: 12px; border: 1.5px solid var(--border);
    box-shadow: 0 1px 8px rgba(0,0,0,0.07);
  }

</style>
</head>
<body>

<!-- ─── Page header ─── -->
<div class="page-header">
  <div class="page-title">NCAP Draw Toolbar</div>
</div>


<!-- ═══════════════════════════════════════════════════
     Section 3 — Interactive demo
     ═══════════════════════════════════════════════════ -->
<div class="section">
  <div class="section-label">Interactive Demo</div>

  <div class="demo-card">
    <div class="demo-card-title">Click the pencil to start drawing</div>

    <!-- Figma toolbar, interactive -->
    <div class="ft-wrap" id="live-toolbar">
      <div class="ft-badge">✦ New</div>
      <div class="ft-title">Draw an area on the map</div>
      <div class="ft-btns">
        <button class="ft-btn fb-disabled" id="btn-undo"   title="Undo"><i class="fa-solid fa-arrow-rotate-left"></i></button>
        <button class="ft-btn fb-disabled" id="btn-redo"   title="Redo"><i class="fa-solid fa-arrow-rotate-right"></i></button>
        <button class="ft-btn fb-default"  id="btn-draw"   title="Draw boundary"><i class="fa-solid fa-pencil"></i></button>
        <button class="ft-btn fb-default"  id="btn-save"   title="Save"><i class="fa-solid fa-floppy-disk"></i></button>
        <button class="ft-btn fb-disabled" id="btn-delete" title="Delete"><i class="fa-solid fa-trash-can"></i></button>
      </div>
    </div>

    <div class="demo-hint" id="live-hint">
      Undo, redo, and delete are disabled until drawing begins.
    </div>
  </div>
</div>


<script>
  /* ── Button states reference: click to toggle active ── */
  document.querySelectorAll('.states-row .icon-btn').forEach(btn => {
    btn.addEventListener('click', () => btn.classList.toggle('active'));
  });

  /* ── Live toolbar: pencil toggles drawing mode ── */
  const btnDraw   = document.getElementById('btn-draw');
  const btnUndo   = document.getElementById('btn-undo');
  const btnRedo   = document.getElementById('btn-redo');
  const btnDelete = document.getElementById('btn-delete');
  const hint      = document.getElementById('live-hint');

  let drawing = false;

  btnDraw.addEventListener('click', () => {
    drawing = !drawing;

    if (drawing) {
      btnDraw.className   = 'ft-btn fb-active';
      btnUndo.className   = 'ft-btn fb-default';
      btnRedo.className   = 'ft-btn fb-default';
      btnDelete.className = 'ft-btn fb-default';
      hint.textContent    = 'Drawing active — all tools are now available.';
    } else {
      btnDraw.className   = 'ft-btn fb-default';
      btnUndo.className   = 'ft-btn fb-disabled';
      btnRedo.className   = 'ft-btn fb-disabled';
      btnDelete.className = 'ft-btn fb-disabled';
      hint.textContent    = 'Undo, redo, and delete are disabled until drawing begins.';
    }
  });

  /* Prevent disabled buttons from doing anything */
  document.querySelectorAll('.ft-btn.fb-disabled').forEach(btn => {
    btn.disabled = true;
  });
</script>
</body>
</html>
